<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a1420"/><stop offset="100%" stop-color="#1a2535"/></linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c9a84c"/><stop offset="50%" stop-color="#e8c96a"/><stop offset="100%" stop-color="#a8841a"/></linearGradient>
    <linearGradient id="card2" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="#1a2535"/><stop offset="100%" stop-color="#2a3a50"/></linearGradient>
    <radialGradient id="chip" cx="0.5" cy="0.5" r="0.5"><stop offset="0%" stop-color="#e8d080"/><stop offset="100%" stop-color="#a89040"/></radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Subtle pattern -->
  <g opacity="0.05">
    <circle cx="100" cy="100" r="150" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <circle cx="1100" cy="700" r="200" fill="none" stroke="#c9a84c" stroke-width="1"/>
    <circle cx="600" cy="400" r="300" fill="none" stroke="#c9a84c" stroke-width="0.5"/>
  </g>
  <!-- Gold card - main (tilted) -->
  <g transform="rotate(-8 600 400)">
    <rect x="220" y="200" width="600" height="380" rx="24" fill="url(#card1)"/>
    <!-- Card shine -->
    <rect x="220" y="200" width="600" height="100" rx="24" fill="white" opacity="0.08"/>
    <!-- Chip -->
    <rect x="290" y="305" width="80" height="62" rx="8" fill="url(#chip)"/>
    <rect x="298" y="305" width="4" height="62" fill="#8a7030" opacity="0.4"/>
    <rect x="310" y="305" width="4" height="62" fill="#8a7030" opacity="0.4"/>
    <rect x="322" y="305" width="4" height="62" fill="#8a7030" opacity="0.4"/>
    <rect x="334" y="305" width="4" height="62" fill="#8a7030" opacity="0.4"/>
    <rect x="346" y="305" width="4" height="62" fill="#8a7030" opacity="0.4"/>
    <rect x="290" y="320" width="80" height="3" fill="#8a7030" opacity="0.4"/>
    <rect x="290" y="335" width="80" height="3" fill="#8a7030" opacity="0.4"/>
    <rect x="290" y="350" width="80" height="3" fill="#8a7030" opacity="0.4"/>
    <!-- Contactless symbol -->
    <path d="M430,316 Q450,330 450,336 Q450,342 430,356" fill="none" stroke="#8a5010" stroke-width="3" opacity="0.7"/>
    <path d="M440,310 Q470,328 470,336 Q470,344 440,362" fill="none" stroke="#8a5010" stroke-width="3" opacity="0.7"/>
    <path d="M450,304 Q490,326 490,336 Q490,346 450,368" fill="none" stroke="#8a5010" stroke-width="3" opacity="0.7"/>
    <!-- Card number -->
    <text x="290" y="430" font-size="22" fill="#5a3a05" opacity="0.9" font-family="monospace" letter-spacing="4">4532  ••••  ••••  8742</text>
    <!-- Name -->
    <text x="290" y="490" font-size="16" fill="#5a3a05" opacity="0.8" font-family="sans-serif" font-weight="bold">SOPHIE LAURENT</text>
    <!-- Expiry -->
    <text x="680" y="490" font-size="14" fill="#5a3a05" opacity="0.7" font-family="monospace">12/28</text>
    <!-- VISA text -->
    <text x="680" y="345" font-size="38" fill="#5a3a05" opacity="0.7" font-family="serif" font-weight="bold" font-style="italic">VISA</text>
    <!-- Bank name -->
    <text x="290" y="270" font-size="14" fill="#5a3a05" opacity="0.7" font-family="sans-serif">SwizKote Bank</text>
    <text x="290" y="285" font-size="11" fill="#5a3a05" opacity="0.5" font-family="sans-serif">Visa Infinite</text>
  </g>
  <!-- Dark card - behind (tilted other way) -->
  <g transform="rotate(5 600 400)">
    <rect x="380" y="250" width="600" height="380" rx="24" fill="url(#card2)"/>
    <rect x="380" y="250" width="600" height="100" rx="24" fill="white" opacity="0.04"/>
    <!-- Magnetic stripe -->
    <rect x="380" y="330" width="600" height="50" fill="#0a0f15"/>
    <!-- Signature strip -->
    <rect x="420" y="420" width="380" height="40" rx="4" fill="#f0ead8"/>
    <text x="430" y="445" font-size="12" fill="#888" font-family="monospace">****  ****  ****  4521</text>
    <!-- Mastercard circles -->
    <circle cx="770" cy="320" r="35" fill="#eb001b" opacity="0.9"/>
    <circle cx="810" cy="320" r="35" fill="#f79e1b" opacity="0.9"/>
    <ellipse cx="790" cy="320" rx="18" ry="35" fill="#ff5f00" opacity="0.6"/>
    <!-- Bank name dark card -->
    <text x="420" y="285" font-size="14" fill="white" opacity="0.5" font-family="sans-serif">SwizKote Bank</text>
    <text x="420" y="299" font-size="11" fill="white" opacity="0.35" font-family="sans-serif">Mastercard Gold</text>
  </g>
  <!-- Reflection/light effect -->
  <ellipse cx="600" cy="700" rx="400" ry="50" fill="#c9a84c" opacity="0.04"/>
</svg>