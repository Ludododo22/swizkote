<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="30%" stop-color="#2e1a4a"/>
      <stop offset="60%" stop-color="#4a2a6a"/>
      <stop offset="80%" stop-color="#8a4a30"/>
      <stop offset="100%" stop-color="#c07020"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#c9a84c"/><stop offset="100%" stop-color="#e8c96a"/></linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a1a4a"/><stop offset="100%" stop-color="#1a0f2e"/></linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sunset)"/>
  <!-- Stars/moon -->
  <circle cx="200" cy="100" r="2" fill="white" opacity="0.8"/>
  <circle cx="400" cy="60" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="800" cy="80" r="2" fill="white" opacity="0.7"/>
  <circle cx="1200" cy="50" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="1500" cy="120" r="2" fill="white" opacity="0.8"/>
  <circle cx="100" cy="200" r="1" fill="white" opacity="0.5"/>
  <!-- Moon -->
  <circle cx="1400" cy="130" r="40" fill="#f5e8c0" opacity="0.9"/>
  <circle cx="1418" cy="120" r="36" fill="#4a2a6a" opacity="0.7"/>
  <!-- Lake Zurich reflection -->
  <rect x="0" y="620" width="1600" height="280" fill="url(#water)"/>
  <!-- Horizon glow -->
  <ellipse cx="800" cy="620" rx="800" ry="60" fill="#c07020" opacity="0.3"/>
  <ellipse cx="800" cy="620" rx="500" ry="30" fill="#e8a040" opacity="0.4"/>
  <!-- Reflection shimmer -->
  <rect x="600" y="640" width="400" height="2" rx="1" fill="#e8c96a" opacity="0.3"/>
  <rect x="500" y="660" width="600" height="2" rx="1" fill="#c9a84c" opacity="0.2"/>
  <rect x="650" y="680" width="300" height="1" rx="1" fill="#e8c96a" opacity="0.2"/>
  <!-- Grossmünster church towers (iconic Zurich) -->
  <rect x="680" y="300" width="70" height="320" fill="#2a1a3e"/>
  <polygon points="680,300 715,220 750,300" fill="#2a1a3e"/>
  <rect x="750" y="300" width="70" height="320" fill="#2a1a3e"/>
  <polygon points="750,300 785,220 820,300" fill="#2a1a3e"/>
  <!-- Church windows -->
  <rect x="698" y="350" width="20" height="40" rx="10" fill="#c9a84c" opacity="0.6"/>
  <rect x="728" y="350" width="20" height="40" rx="10" fill="#c9a84c" opacity="0.5"/>
  <rect x="768" y="350" width="20" height="40" rx="10" fill="#c9a84c" opacity="0.6"/>
  <rect x="798" y="350" width="20" height="40" rx="10" fill="#c9a84c" opacity="0.5"/>
  <!-- Church rose window -->
  <circle cx="715" cy="490" r="22" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.5"/>
  <circle cx="715" cy="490" r="14" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.4"/>
  <circle cx="785" cy="490" r="22" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.5"/>
  <!-- Buildings left side -->
  <rect x="100" y="420" width="120" height="200" fill="#1e1228"/>
  <rect x="50" y="480" width="100" height="140" fill="#180e20"/>
  <rect x="200" y="380" width="90" height="240" fill="#22162e"/>
  <rect x="280" y="440" width="110" height="180" fill="#1e1228"/>
  <rect x="380" y="400" width="80" height="220" fill="#22162e"/>
  <rect x="450" y="460" width="100" height="160" fill="#1a0e24"/>
  <rect x="540" y="420" width="120" height="200" fill="#22162e"/>
  <!-- Buildings right side -->
  <rect x="870" y="380" width="100" height="240" fill="#22162e"/>
  <rect x="960" y="420" width="120" height="200" fill="#1e1228"/>
  <rect x="1070" y="400" width="90" height="220" fill="#22162e"/>
  <rect x="1150" y="440" width="110" height="180" fill="#1e1228"/>
  <rect x="1250" y="380" width="100" height="240" fill="#22162e"/>
  <rect x="1340" y="420" width="120" height="200" fill="#1a0e24"/>
  <rect x="1450" y="400" width="100" height="220" fill="#22162e"/>
  <!-- Building windows - lit -->
  <rect x="115" y="435" width="12" height="18" fill="#c9a84c" opacity="0.7"/>
  <rect x="135" y="435" width="12" height="18" fill="#e8c96a" opacity="0.5"/>
  <rect x="155" y="435" width="12" height="18" fill="#c9a84c" opacity="0.6"/>
  <rect x="115" y="465" width="12" height="18" fill="#e8c96a" opacity="0.4"/>
  <rect x="135" y="465" width="12" height="18" fill="#c9a84c" opacity="0.8"/>
  <rect x="215" y="400" width="12" height="18" fill="#c9a84c" opacity="0.7"/>
  <rect x="235" y="400" width="12" height="18" fill="#e8c96a" opacity="0.5"/>
  <rect x="255" y="400" width="12" height="18" fill="#c9a84c" opacity="0.6"/>
  <rect x="880" y="400" width="12" height="18" fill="#c9a84c" opacity="0.7"/>
  <rect x="900" y="400" width="12" height="18" fill="#e8c96a" opacity="0.6"/>
  <rect x="920" y="400" width="12" height="18" fill="#c9a84c" opacity="0.5"/>
  <rect x="975" y="438" width="12" height="18" fill="#c9a84c" opacity="0.8"/>
  <rect x="995" y="438" width="12" height="18" fill="#e8c96a" opacity="0.5"/>
  <rect x="1015" y="438" width="12" height="18" fill="#c9a84c" opacity="0.7"/>
  <rect x="1260" y="400" width="12" height="18" fill="#c9a84c" opacity="0.7"/>
  <rect x="1280" y="400" width="12" height="18" fill="#e8c96a" opacity="0.5"/>
  <rect x="1300" y="400" width="12" height="18" fill="#c9a84c" opacity="0.8"/>
  <!-- Gold accent horizon line -->
  <rect x="0" y="618" width="1600" height="3" fill="url(#gold)" opacity="0.5"/>
  <!-- City lights reflection in water -->
  <line x1="715" y1="621" x2="715" y2="700" stroke="#c9a84c" stroke-width="2" opacity="0.2"/>
  <line x1="785" y1="621" x2="785" y2="700" stroke="#c9a84c" stroke-width="2" opacity="0.2"/>
  <line x1="715" y1="621" x2="715" y2="680" stroke="#c9a84c" stroke-width="3" opacity="0.3"/>
</svg>