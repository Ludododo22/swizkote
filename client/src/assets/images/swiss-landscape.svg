  <polygon points="167,472 130,562 204,562" fill="#2a5020"/>
  <rect x="240" y="558" width="16" height="82" fill="#1a3010"/>
  <polygon points="248,475 212,568 284,568" fill="#2a5020"/>
  <!-- Trees right -->
  <rect x="1350" y="555" width="16" height="85" fill="#1a3010"/>
  <polygon points="1358,470 1320,565 1396,565" fill="#2a5020"/>
  <rect x="1430" y="560" width="14" height="80" fill="#1a3010"/>
  <polygon points="1437,478 1400,568 1474,568" fill="#2a5020"/>
  <rect x="1510" y="558" width="16" height="82" fill="#1a3010"/>
