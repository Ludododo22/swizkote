<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2c4a6e"/><stop offset="40%" stop-color="#4a7aaa"/><stop offset="100%" stop-color="#8ab4d4"/></linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5a8ab8"/><stop offset="100%" stop-color="#3a6a9a"/></linearGradient>
    <linearGradient id="meadow" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4a7a30"/><stop offset="100%" stop-color="#2a4a18"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#c9a84c"/><stop offset="100%" stop-color="#e8c96a"/></linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="1200" cy="160" r="60" fill="#f5d080" opacity="0.9"/>
  <circle cx="1200" cy="160" r="80" fill="#f5d080" opacity="0.2"/>
