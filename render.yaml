services:
  - type: web
    name: swizkote
    runtime: node
    plan: free
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: swizkote-db
          property: connectionString

databases:
  - name: swizkote-db
    plan: free